services:
  backend:
    build: ./backend
    image: aicademics-backend:latest
    environment:
      AICADEMICS_DATABASE_URL: sqlite:////data/aicademics.db
      AICADEMICS_SIM_PHASE_SECONDS: "0.4"
      AICADEMICS_SEED_CLASSROOMS: "3"
      # Comma-separated origins allowed by CORS. With the bundled nginx the
      # frontend is same-origin, so this mainly matters for direct API use.
      AICADEMICS_CORS_ORIGINS: "http://localhost,http://localhost:8080"
    volumes:
      - aicademics-data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: aicademics-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  aicademics-data:
