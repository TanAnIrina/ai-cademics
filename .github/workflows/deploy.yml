name: Deploy

# Runs on version tags or manual dispatch. The image build always runs; the
# SSH deploy step only runs if the VPS secrets are configured, so the workflow
# is safe (and green) in a fork or before any server exists.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: aicademics-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: aicademics-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (optional)
    needs: build-images
    runs-on: ubuntu-latest
    # Only attempt a deploy when a host has been configured in repo secrets.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file & pull/rebuild on the server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/aicademics
            # Repo-ul este deja clonat aici și .env.prod există pe server.
            git pull --ff-only
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
            docker image prune -f
